services:
    redis:
        image: redis:7-alpine
        container_name: laravel_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - laravel

    php:
        build:
            context: .
        container_name: laravel_php
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            - redis
        volumes:
            - .:/var/www/html
            - /var/www/html/storage
            - /var/www/html/bootstrap/cache
            - /var/www/html/vendor
            - ./scripts:/scripts:ro
        networks:
            - laravel

    web:
        image: nginx:alpine
        container_name: laravel_nginx
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - laravel

    node:
        image: node:19-alpine
        container_name: laravel_node
        working_dir: /app
        volumes:
            - .:/app
            - /app/.pnpm-store
        command: sh -c "npm install -g pnpm && pnpm install && pnpm run build"
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    redis_data:
